name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit -p .
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: 'https://placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'placeholder-build-key'

  mcp:
    name: MCP server — type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-nik
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/mcp-nik/package-lock.json
      - name: Install
        run: npm install
      - name: Type-check
        run: npx tsc --noEmit -p .

  wiring-check:
    name: Wiring — registry coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Verify every screen imports through the registry (no raw Supabase calls in screens)
        run: |
          set -e
          if grep -rn "from '@supabase/supabase-js'" web/src/screens/ 2>/dev/null; then
            echo "::error::Screens must not import Supabase directly. Use ops via useOp/useOpMutation from web/src/lib/useOp.ts."
            exit 1
          fi
          if grep -rn "supabase\\.from\\|supabase\\.rpc\\|supabase\\.auth" web/src/screens/ 2>/dev/null; then
            echo "::error::Screens must not call supabase.* directly."
            exit 1
          fi
          echo "✓ no raw Supabase calls in screens"
